- id: tco-comparison-model
  title: "TCO Model"
  subtitle: "Total Cost of Ownership Comparison"
  tagline: "8-layer lifecycle TCO analysis with Monte Carlo simulation, stress testing, and financial translation."
  domain: "Capital Equipment"
  color: "#8B5CF6"
  gradient: "from-violet-500 to-purple-400"
  status: "Production-Ready"
  problem_statement: >
    Capital equipment sourcing decisions across emerging and developed markets are
    driven by unit price, ignoring the 60 to 80% of lifecycle cost hidden in
    installation, maintenance, spares logistics, FX risk, and operational downtime.
  solution_summary: >
    An 8-layer deterministic TCO calculator with 10,000-path lognormal Monte Carlo
    simulation, a 6-scenario macro stress-test engine, NPV/IRR/EBITDA financial
    translation, weighted supplier scorecards, and prescriptive optimization.
    Every output carries evidence classification tags.
  architecture_summary: >
    Equipment specs and supplier data flow through a validation layer into an
    8-layer deterministic TCO engine, then through Monte Carlo simulation and
    scenario stress-testing. Results feed financial translation and supplier
    scorecards, converging into prescriptive optimization surfaced via a multi-page
    Streamlit dashboard and an 11-endpoint FastAPI REST API.
