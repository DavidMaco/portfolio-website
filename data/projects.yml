- id: pvis
  title: "PVIS"
  subtitle: "Procurement Volatility Intelligence System"
  tagline: "Regime-weighted Monte Carlo FX simulation, composite supplier risk scoring, and working capital optimization."
  domain: "Procurement Analytics"
  color: "#10B981"
  gradient: "from-emerald-500 to-teal-400"
  status: "Production-Ready"
  problem_statement: >
    Manufacturing procurement teams face three critical blind spots: FX volatility
    (a 15% NGN devaluation can wipe out 180M+ NGN in margin), supplier risk (late
    deliveries cascade into production stoppages), and cash leakage (cost variances
    against standard costs go undetected across 1,000+ PO lines).
  solution_summary: >
    PVIS implements regime-weighted Monte Carlo FX simulation (10K to 50K paths over
    up to 1,095 trading days) with live dual-API FX failover, a 6-factor composite
    supplier risk scoring model, cost leakage detection, and CCC optimization.
    Surfaced through an 8-page interactive Streamlit dashboard with full demo mode
    and a Power BI decision layer.
  architecture_summary: >
    Three-tier architecture: ingestion layer (live FX APIs, CSV upload, 3-year seed
    generator) feeding a 19-table MySQL OLTP store and star-schema warehouse,
    processed by an analytics engine (Monte Carlo FX, composite risk, spend
    aggregation, working capital KPIs), presented in an 8-page Streamlit dashboard
    with Plotly charts and a Power BI semantic SQL view layer.
  architecture_layers:
    - name: "Ingestion"
      description: "Live FX APIs with dual-provider failover, CSV upload, 3-year seed generator"
      tech: "Python, REST APIs, Aiven MySQL"
    - name: "Storage"
      description: "19-table OLTP schema with star-schema warehouse for analytical queries"
      tech: "MySQL 8.0, Aiven Cloud"
    - name: "Analytics"
      description: "Regime-weighted Monte Carlo, 6-factor risk scoring, CCC optimization"
      tech: "NumPy, SciPy, pandas"
    - name: "Presentation"
      description: "8-page interactive dashboard with demo mode and Power BI semantic layer"
      tech: "Streamlit, Plotly, Power BI"
  business_impact:
    - "Regime-weighted Monte Carlo simulation with 10K to 50K GBM paths, P5/P50/P95 bands"
    - "6-factor composite supplier risk scoring (OTD, defects, cost variance, FX, lead-time, geo)"
    - "Live FX monitoring for 150+ currencies with dual-API failover"
    - "Cost leakage detection via unit-price vs. standard-cost variance"
    - "Cash Conversion Cycle optimization with DIO/DPO modeling"
  stack:
    - "Python 3.13+"
    - "MySQL 8.0"
    - "Aiven Cloud"
    - "Streamlit"
    - "SQLAlchemy"
    - "NumPy / pandas"
    - "Plotly"
    - "Docker"
    - "GitHub Actions"
  highlights:
    - label: "Pages"
      value: "8"
    - label: "Tables"
      value: "19"
    - label: "FX Currencies"
      value: "150+"
    - label: "MC Paths"
      value: "50K"
  key_features:
    - "Live demo on Streamlit Cloud with Aiven MySQL, all 8 pages fully interactive"
    - "Regime-weighted Monte Carlo with configurable horizon (30 to 1,095 days)"
    - "Auto-generated per-supplier negotiation action playbooks"
    - "Interactive company data upload with full pipeline re-run"
    - "Demo Mode operates with full functionality without database"
  dashboard_pages:
    - page: "FX Volatility Dashboard"
      icon: "activity"
      description: "Regime-weighted Monte Carlo with 50K GBM paths, live FX monitoring, configurable horizon, and P5/P50/P95 exposure bands."
      metrics: ["P95 Exposure", "VaR 95%", "Regime Wt", "Live Rate"]
    - page: "Supplier Risk Matrix"
      icon: "alert-triangle"
      description: "6-factor composite scoring across OTD, defects, cost variance, FX sensitivity, lead-time, and geographic risk."
      metrics: ["Score", "OTD %", "Defect PPM", "FX Sens"]
    - page: "Cost Leakage Analyzer"
      icon: "search"
      description: "Unit price vs. standard cost variance flagging across 1,000+ PO lines with drill-down to individual orders."
      metrics: ["Leakage %", "Variance", "Risk Cat", "PO Exp"]
    - page: "Working Capital Optimizer"
