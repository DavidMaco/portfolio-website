    - name: "Input Validation"
      description: "Equipment specs, supplier quotes, and regional cost factors validated via Pydantic"
      tech: "Pydantic v2, YAML"
    - name: "TCO Engine"
      description: "8-layer deterministic calculator: Acquisition, Installation, Operating, Maintenance, Spares, Risk, Utilization, Residual"
      tech: "Python, NumPy"
    - name: "Simulation"
      description: "10,000-path lognormal Monte Carlo with 6-scenario macro stress testing"
      tech: "NumPy, SciPy"
    - name: "Financial Translation"
      description: "NPV, IRR, EBITDA impact, working capital drag per sourcing option"
      tech: "pandas, NumPy"
    - name: "Presentation"
      description: "Multi-page dashboard and 11-endpoint REST API with auth"
      tech: "Streamlit, FastAPI, Plotly"
  business_impact:
