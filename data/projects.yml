- id: aegis-procurement
  title: "AEGIS"
  subtitle: "Adaptive Engine for Global Intelligent Sourcing"
  tagline: "16 analytics engines, 40+ table MySQL schema, 27-endpoint REST API, and 12-page executive dashboard."
  domain: "Procurement Analytics"
  color: "#3B82F6"
  gradient: "from-blue-500 to-cyan-400"
  status: "Production-Ready"
  problem_statement: >
    Procurement organizations lack a unified system to quantify supplier risk,
    FX exposure, ESG compliance, and cost leakage across global supply chains.
    Decisions are made on incomplete data spread across siloed ERPs, spreadsheets,
    and manual reports.
  solution_summary: >
    AEGIS integrates 16 analytics engines, including Monte Carlo simulation,
    MCDA supplier scoring (TOPSIS, PROMETHEE-II), game-theoretic negotiation,
    digital-twin supply-chain simulation, and NLP spend classification, over a
    normalized 40+ table MySQL schema with star-schema warehouse ETL, surfaced
    through a 12-page Streamlit dashboard and a 27-endpoint FastAPI REST API
    with JWT and API-key authentication.
  architecture_summary: >
    Data flows from ERP/PO/FX sources through a 14-step seed data generator into a
    30+ table OLTP layer, then through star-schema ETL (SCD Type 2) into a dimensional
    warehouse, consumed by 16 analytics engines. Results surface via a 12-page Streamlit
    dashboard, 27-endpoint FastAPI REST API, and Power BI semantic views.
  architecture_layers:
    - name: "Data Ingestion"
      description: "ERP connectors, CSV upload, 14-step seed generator, FX API feeds"
      tech: "Python, SQLAlchemy, REST APIs"
    - name: "Storage Layer"
      description: "40+ table OLTP schema with star-schema warehouse and SCD Type 2 ETL"
      tech: "MySQL 8.0, Star Schema"
    - name: "Analytics Engine"
      description: "16 engines: Monte Carlo, TOPSIS, PROMETHEE-II, Nash bargaining, Digital Twin, NLP"
      tech: "NumPy, SciPy, pandas"
    - name: "API Layer"
      description: "27 REST endpoints with JWT + API-key auth, rate limiting, OpenAPI docs"
      tech: "FastAPI, Pydantic v2"
    - name: "Presentation"
      description: "12-page interactive dashboard with real-time filtering and drill-down"
      tech: "Streamlit, Plotly, Power BI"
  business_impact:
    - "7-dimension composite risk scoring across Financial, Operational, Geopolitical, Compliance, Concentration, ESG, and Cyber"
    - "10,000-path Geometric Brownian Motion Monte Carlo for FX risk with P5 to P95 bands and VaR"
    - "GHG Protocol Scope 3 carbon tracking with GLEC Framework emission factors"
    - "HHI concentration analysis across 5 dimensions"
    - "Should-cost models with leakage flags at 5%, 15%, and 25% thresholds"
  stack:
    - "Python 3.11+"
    - "MySQL 8.0"
    - "Streamlit"
    - "FastAPI"
    - "SQLAlchemy"
    - "NumPy / pandas"
    - "Plotly"
    - "Docker"
    - "GitHub Actions"
    - "JWT Auth"
  highlights:
    - label: "Engines"
      value: "16"
    - label: "Tables"
      value: "40+"
    - label: "API Endpoints"
      value: "27"
    - label: "Tests"
      value: "335"
  key_features:
    - "TOPSIS + PROMETHEE-II multi-criteria supplier scoring with interactive weight sliders"
    - "Game-theoretic negotiation engine (Nash bargaining, Vickrey/first-price auctions)"
    - "Digital-twin supply-chain simulation with multi-scenario Monte Carlo"
    - "RL-based inventory allocation (tabular Q-learning) and GenAI copilot"
    - "335 pytest tests (0 require database), CI with security scanning"
  dashboard_pages:
    - page: "Supplier Risk Scorecard"
      icon: "crosshair"
      description: "TOPSIS + PROMETHEE-II composite scores across 7 risk dimensions with interactive weight sliders and HHI concentration heat map."
      metrics: ["7-Dim Score", "HHI Index", "ESG Rating", "Cyber Risk"]
    - page: "FX Monte Carlo Forecast"
      icon: "trending-down"
      description: "10,000-path GBM simulation with P5/P50/P95 FX bands, VaR (95%), CVaR, and configurable horizon sliders."
      metrics: ["P95 Exposure", "VaR 95%", "CVaR", "Volatility"]
    - page: "Spend Intelligence"
      icon: "dollar-sign"
