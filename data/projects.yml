- id: sustainability-roi
  title: "Green ROI"
  subtitle: "Sustainability ROI Calculator for Manufacturing"
  tagline: "Quantified financial and environmental outcomes for sustainable procurement decisions."
  domain: "Green Procurement"
  color: "#059669"
  gradient: "from-emerald-600 to-green-400"
  status: "Pilot-Ready"
  problem_statement: >
    Sustainability programs are approved on policy grounds but stall at budget
    review. Organizations need measurable financial and environmental outcomes
    that decision-makers can evaluate directly, particularly in Nigerian FMCG
    manufacturing where budget justification is critical.
  solution_summary: >
    A decision-support analytics platform quantifying procurement cost increase,
    carbon reduction, operational savings, net annual ROI, and payback period for
    switching to sustainable materials. Built with seed-based deterministic
    execution, Pydantic typed contracts, and a pluggable DataAdapter abstraction.
  architecture_summary: >
    Streamlit UI atop a pure domain calculation layer (models, materials, scenarios,
    recommendations), fed by a pluggable ingestion layer (DataAdapter abstraction
    with CSV/JSON adapter). A pipeline runner orchestrates batch execution, producing
    generated artifacts in the data directory.
  architecture_layers:
    - name: "Ingestion"
      description: "Pluggable DataAdapter abstraction supporting CSV, JSON, database, and API sources"
      tech: "Python, Pydantic"
    - name: "Domain Engine"
      description: "Pure calculation layer: material models, scenario building, ROI computation"
      tech: "Python, NumPy"
    - name: "Pipeline Runner"
      description: "Orchestrated batch execution producing deterministic, reproducible artifacts"
      tech: "Python, seed-based RNG"
    - name: "Presentation"
      description: "Interactive scenario builder with real-time ROI recalculation"
      tech: "Streamlit, Plotly"
  business_impact:
    - "~82% carbon reduction quantified under demonstration assumptions"
    - "Net annual ROI calculated with full cost-benefit breakdown"
    - "Operational savings: Carbon Tax Avoidance + Water Savings + Waste Savings"
    - "Configurable economic parameters (carbon tax, water cost, waste cost)"
  stack:
    - "Python 3.12+"
    - "Streamlit"
    - "Plotly"
    - "Pydantic"
    - "pytest"
    - "GitHub Actions"
  highlights:
    - label: "CO2 Cut"
