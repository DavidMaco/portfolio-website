<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}David Igbonaju{% endblock %}</title>
  <meta name="description" content="{% block description %}Data & Analytics Engineer building investment-grade procurement intelligence platforms.{% endblock %}">
  <meta name="author" content="David Igbonaju">

  <!-- Open Graph -->
  <meta property="og:title" content="{% block og_title %}David Igbonaju — Portfolio{% endblock %}">
  <meta property="og:description" content="Data & Analytics Engineer — Procurement Intelligence Platforms">
  <meta property="og:type" content="website">

  <!-- Favicon -->
  <link rel="icon" href="{{ base }}static/favicon.svg" type="image/svg+xml">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="{{ base }}static/css/main.css">

  {% block head_extra %}{% endblock %}
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" role="navigation" aria-label="Main">
    <div class="nav-inner">
      <a href="{{ base }}index.html" class="nav-logo">david<span>.</span></a>
      <ul class="nav-links">
        <li><a href="{{ base }}index.html#projects">Projects</a></li>
        <li><a href="{{ base }}index.html#expertise">Expertise</a></li>
        <li><a href="https://github.com/DavidMaco" target="_blank" rel="noopener">GitHub</a></li>
        <li><a href="https://linkedin.com/in/david-igbonaju-a202821a0" target="_blank" rel="noopener">LinkedIn</a></li>
      </ul>
      <button class="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Page Content -->
  {% block content %}{% endblock %}

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-copy">&copy; 2026 David Igbonaju. All project metrics derived from documented methodologies.</div>
        <ul class="footer-links">
          <li><a href="https://github.com/DavidMaco" target="_blank" rel="noopener">GitHub</a></li>
          <li><a href="https://linkedin.com/in/david-igbonaju-a202821a0" target="_blank" rel="noopener">LinkedIn</a></li>
          <li><a href="mailto:davidigbonaju@email.com">Email</a></li>
        </ul>
      </div>
    </div>
  </footer>

  <script src="{{ base }}static/js/main.js"></script>
</body>
</html>
